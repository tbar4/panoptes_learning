# Part IV — Async
# (auto-converted from MCQ; some upgraded to ShortAnswer/Tracing by hand)

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Across the async arc, what is the single most common mistake the workspace lint (deny unused_must_use) is designed to catch?"
prompt.distractors = [
  "Leaving off a trailing semicolon, which turns an expression into a statement in an unexpected way",
  "Reaching for the wrong integer type, such as an i32 where a u64 was the type actually required here",
  "Forgetting a needed derive on a struct, so that some later trait bound fails to be satisfied at all",
]
answer.answer = "Calling an async fn to build a future but forgetting to .await it, so the work is silently dropped"
context = """An un-awaited future does nothing. It is an easy and invisible bug — the request simply never happens. Denying unused_must_use turns that warning into a build error, so the mistake cannot ship."""
id = "b64d5c8d-5d70-4016-85a7-cd3959fda50e"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "The response_id is a hash of (vignette_id, model, epoch) rather than a readable string. Why?"
prompt.distractors = [
  "Because a hash is shorter than a readable id, which keeps the JSONL response log more compact on disk",
  "Because JSONL requires every record's id field to be a fixed-width hexadecimal hash value just like this",
  "Because only a hash can guarantee ids are unique, which a readable composite string could not manage to do",
]
answer.answer = "So a coder reading a coding sheet cannot recover the model or parameters from the id, preserving blinding"
context = """A readable id like 'ca_geo-030-claude-x-0' would leak the model and parameters onto the coding sheet, breaking blinding. The hash keeps the id deterministic (reproducible) but opaque (reveals nothing). Uniqueness could be achieved either way; opacity is the reason."""
id = "2a23d314-0f1e-44e7-b6a3-643ebb19a863"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why can the Anthropic client be tested with zero API spend and full determinism?"
prompt.distractors = [
  "The test bypasses the network entirely by swapping out reqwest for a purely in-process stub client object",
  "Anthropic's API is billed as completely free whenever a request arrives while the code is running in test mode",
  "The test suite caches genuine responses from an earlier real run and then simply replays them back to the client each time",
]
answer.answer = "wiremock runs a real local server with canned responses, and the client's base_url is aimed at it, not the real API"
context = """The client makes a genuine HTTP request to a local wiremock server that returns exactly what the test configured. Real request path, controlled response, no key, no cost, no flakiness — enabled by the base_url seam the test forced."""
id = "63b8d187-066d-42a7-b075-004097b5e79a"

[[questions]]
type = "ShortAnswer"
prompt.prompt = "Rust has no built-in async runtime. What is the name of the de facto standard runtime crate this course uses to drive futures?"
answer.answer = "tokio"
answer.alternatives = ["Tokio"]
context = """
`tokio` is the ecosystem-standard async runtime. The `#[tokio::main]` attribute sets it up so your top-level async code has a scheduler to poll its futures. Futures are inert on their own — the runtime is what drives them to completion.
"""
id = "3884b25d-cfdd-4d7b-b2ed-0f95615b45c5"
