prompt.prompt = "Why keep Stages 5–6 (inter-rater reliability, analysis) in Python rather than extending the Rust harness?"
prompt.distractors = [
  "Rust simply cannot perform the kind of floating-point arithmetic that these particular reliability statistics fundamentally depend on right here",
  "Python executes these reliability calculations considerably faster than compiled Rust would on the very same data",
