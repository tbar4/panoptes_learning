[[questions]]
type = "MultipleChoice"
prompt.prompt = "What does 'the interface is the file, not a language binding' enable?"
prompt.distractors = [
  "The Rust and Python sides now both automatically come to share the very same struct definitions directly across the crate boundary",
  "Ordinary Python code can be embedded and then executed directly inside the Rust harness at run time itself",
  "The whole pipeline now compiles faster because the shared file format removes a cross-language dependency",
]
answer.answer = "A typed Rust harness and a pandas notebook coexist because each depends only on the JSONL/CSV schema, not the other's language"
context = """Because both sides agree only on the file schema, neither depends on the other's implementation language. Rust writes the files; Python reads them. You could replace either side without touching the other. Boundaries at data, not code."""
