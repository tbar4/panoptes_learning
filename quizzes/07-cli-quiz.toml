# Part VII — CLI
# (auto-converted from MCQ; some upgraded to ShortAnswer/Tracing by hand)

[[questions]]
type = "MultipleChoice"
prompt.prompt = "The `panoptes` binary uses `assert_cmd` in an integration test. What does that test actually run?"
prompt.distractors = [
  "The command's functions invoked directly in-process, skipping over both the shell and the real compiled binary",
  "A lightweight mock of the CLI that stands in for the binary while it returns canned output text back",
  "Only the generated --help text, checking it against the flags that are declared on the clap struct",
]
answer.answer = "The compiled binary as a subprocess, so it exercises real CLI behavior including arg parsing and exit codes"
context = """assert_cmd invokes the built binary as an external process — the same way a user or a shell script would. That is what lets you assert on real exit codes and end-to-end behavior, not just internal function returns."""
id = "909b2955-aa17-4bc1-92d2-7a0b9c74eb6f"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why return `ExitCode` (or `Result`) from main rather than managing exit integers by hand?"
prompt.distractors = [
  "Returning a typed value from main lets the compiler optimize the process's exit path far more aggressively",
  "Raw integer exit codes are simply not something that a Rust main function is ever actually allowed to return",
  "clap requires that main return an ExitCode so that it can attach its own error messages onto the process exit status",
]
answer.answer = "It moves success and failure into a typed value the runtime maps to the exit code, so an Err becomes a non-zero exit"
context = """Returning a type that carries success or failure means the process's exit status is handled by the type system, not by remembering to call a raw exit function. An Err propagating to main becomes a non-zero exit for free — honest exit codes without manual bookkeeping."""
id = "2d8b289b-697c-49a6-9948-9efbcd78f11c"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "The subcommand enum gets a `match` in the dispatch. What does the compiler guarantee about that match?"
prompt.distractors = [
  "That the subcommand match arms are evaluated in the exact order in which they are written in the source",
  "That clap will automatically generate the whole --help text out of the arms of the dispatch match itself",
  "Nothing in particular; a match over the subcommands is really just ordinary control flow as far as the compiler itself can see",
]
answer.answer = "Exhaustiveness: add a subcommand variant and forget its arm and it will not compile — the net enums gave codebook values"
context = """Matching on an enum must cover every variant. Add a Report subcommand and forget to handle it, and the compiler stops you. Exhaustiveness turns 'I forgot a case' from a runtime surprise into a build error — the recurring theme, applied to the CLI's control flow."""
id = "c91edaac-de01-41ea-bfdc-9beef5304256"

[[questions]]
type = "ShortAnswer"
prompt.prompt = "By convention, what integer exit code does a command-line program return to signal success?"
answer.answer = "0"
answer.alternatives = ["zero"]
context = """
Exit code 0 means success; any non-zero code means failure. This convention is what makes shell composition work: in `a && b`, `b` runs only if `a` exited 0. `panoptes code` returns non-zero on invalid data precisely so it can gate a pipeline.
"""
id = "edd6fd56-c560-4238-9211-d26773a9d7be"
