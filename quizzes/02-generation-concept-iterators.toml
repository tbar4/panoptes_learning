# Iterators Concept-Check
# (auto-converted from MCQ; some upgraded to ShortAnswer/Tracing by hand)

[[questions]]
type = "MultipleChoice"
prompt.prompt = "In the generation chain `iproduct!(...).filter(valid).map(to_vignette).collect()`, when does the actual work happen?"
prompt.distractors = [
  "At iproduct!, which eagerly materializes the entire cartesian product into memory up front",
  "At each adaptor call, since filter and map each run as soon as they are written into the chain",
  "At compile time, because the compiler evaluates the whole iterator chain during monomorphization",
]
answer.answer = "At collect() — iterators are lazy, so nothing runs until the chain is finally consumed"
context = """Rust iterators are lazy. iproduct!, filter, and map only describe the computation; collect() drives it, pulling values through the whole chain. Until then, no combination is actually generated."""
id = "1c22e16f-2e5c-4fd1-9e2d-40a380fac99b"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why prefer the iterator chain over four nested for-loops here?"
prompt.distractors = [
  "It runs strictly faster than nested loops because iterator adaptors are specially optimized by the tokio runtime",
  "Nested for-loops simply cannot express a four-way cartesian product without extra bookkeeping state of their own",
  "Iterator chains always allocate strictly less memory than the equivalent loop, whatever the workload happens to be here",
]
answer.answer = "It is lazy and composable and makes the computation's shape legible, and monomorphization makes it as tight as a loop"
context = """The win is legibility and composability at no performance cost — monomorphization typically makes the chain as fast as the loop. Loops can express the product; they just read less clearly and are harder to test stage by stage."""
id = "34d000dd-4b36-45f0-9027-5b4c2dfa4a5c"
