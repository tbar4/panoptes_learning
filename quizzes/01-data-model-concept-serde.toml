[[questions]]
type = "ShortAnswer"
prompt.prompt = "What attribute do you put above a struct so serde generates its serialization and deserialization code? Give it with both traits, e.g. `#[derive(...)]`."
answer.answer = "#[derive(Serialize, Deserialize)]"
answer.alternatives = ["#[derive(Deserialize, Serialize)]", "derive(Serialize, Deserialize)"]
context = """
`#[derive(Serialize, Deserialize)]` invokes serde's derive macros, which read the struct's fields at compile time and emit the conversion code. This is the same derive mechanism as `#[derive(Debug)]` or `#[derive(Clone)]` — a code generator, not runtime reflection.
"""
id = "d86f96ce-ba40-45c7-a4e8-b3a83836554d"
