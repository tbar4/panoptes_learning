[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why does `panoptes-core` hold every type that crosses a crate boundary, rather than each crate defining its own?"
prompt.distractors = [
  "Because Rust requires every type shared across a workspace to live in one single dedicated crate",
  "So the core crate stays the largest, which the linker needs in order to resolve cross-crate symbols",
  "Because serde's derive macros only function inside one crate per workspace, so the types must centralize",
]
answer.answer = "So the data model is defined once and the compiler propagates any change to every downstream crate"
context = """Single source of truth. Add a StrategicLogic variant in core and every dependent crate sees it immediately, with the compiler flagging anything that no longer handles all cases. Duplicated types would drift."""
