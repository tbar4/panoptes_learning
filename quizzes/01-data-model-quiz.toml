[[questions]]
type = "MultipleChoice"
prompt.prompt = "`vignette_id` produces a human-readable ID like `ca_geo-030-H-REV-INFO`. Later, `response_id` will be an opaque hash. Why the deliberate difference?"
prompt.distractors = [
  "The vignette_id is precomputed for speed, while the response_id is hashed lazily on demand to save on disk storage space",
  "They serve exactly the same role, and the formatting difference is purely a matter of readability preference",
  "The response_id has to be shorter than the vignette_id so that the response log stays compact on disk",
]
answer.answer = "The vignette_id encodes parameters for the manifest join; the response_id hides model and params to keep coders blinded"
context = """vignette_id is a join key that intentionally encodes parameters. response_id is opaque precisely so a coder looking at a coding sheet cannot read off which model or parameters produced the response — the blinding property, which matters because you are both builder and coder."""
id = "368d1b69-49e7-4c83-a278-3c948ec319ae"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What makes the JSONL schema of `ResponseRecord` 'the contract'?"
prompt.distractors = [
  "It is declared in a formal contract file that serde loads and then enforces against every record written",
  "serde legally enforces the schema at runtime and rejects any record whose fields drift from the contract",
  "Once the first record is written the schema is frozen, so the format can never again be changed at all",
]
answer.answer = "Every later stage reads it, so while the schema holds the tool that writes it can be swapped for another"
context = """The value is in the interface, not the implementation. Analysis reads the JSONL; the harness writes it. Fix the schema and you can rewrite the harness in another language without touching anything downstream. That is what 'the tool is fungible' means."""
id = "0545bf4f-f565-4760-945e-a22ffc21408c"
