[[questions]]
type = "MultipleChoice"
prompt.prompt = "The manifest.csv is described as 'the join spine'. What does that mean for Stage 5 analysis?"
prompt.distractors = [
  "Analysis must re-parse every prompt file",
  "The manifest replaces the response log",
  "It is only for human reference",
]
answer.answer = "Because the manifest maps vignette_id to parameters, analysis joins responses to parameters in one step instead of reconstructing them"
context = """The manifest is the single place parameters live keyed by vignette_id. Analysis joins the response log to the manifest on that key — 'escalation vs attribution confidence' becomes a one-line join. Without it, you would be reverse-engineering parameters from IDs or prompts."""
id = "9c212ba6-1a55-44c5-b7be-db3d98360e09"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why does the same `#[derive(Deserialize)]` handle both the YAML family spec and JSON records?"
prompt.distractors = [
  "serde has separate derives per format that happen to look the same",
  "YAML and JSON are the same format",
  "The derive only works for YAML and JSON is special-cased",
]
answer.answer = "serde is format-agnostic: the derive describes the type's shape, and a format crate (serde_yaml, serde_json) handles the encoding"
context = """serde separates the data model (your derived types) from the format (the serde_* crate). One derive, many formats. This is why moving between YAML config and JSON logs costs you nothing."""
id = "61586956-98b9-4eec-aa06-ed06d25e111f"
