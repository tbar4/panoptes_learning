[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why does the same `#[derive(Deserialize)]` handle both the TOML family spec and JSON records?"
prompt.distractors = [
  "serde ships a separate derive for each format, and the TOML and JSON ones just happen to look identical",
  "TOML and JSON are structurally the very same format, so one derive naturally ends up covering both of them",
  "The derive only ever targets TOML, and the JSON records are actually handled by a separate special-cased path",
]
answer.answer = "serde is format-agnostic — the derive describes the type's shape, a format crate handles the encoding"
context = """serde separates the data model (your derived types) from the format (the format crate). One derive, many formats. This is why moving between TOML config and JSON logs costs you nothing."""
id = "61586956-98b9-4eec-aa06-ed06d25e111f"
