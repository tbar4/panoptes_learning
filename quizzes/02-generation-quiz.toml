[[questions]]
type = "MultipleChoice"
prompt.prompt = "The manifest.csv is described as 'the join spine'. What does that mean for Stage 5 analysis?"
prompt.distractors = [
  "Analysis must re-parse each prompt .txt file to recover the parameters sitting behind every response",
  "The manifest entirely takes the place of the response log, so Stage 5 then reads the parameters and the outputs together",
  "It exists only for human reference and plays no real part in how the Stage 5 join is actually computed",
]
answer.answer = "Because it maps vignette_id to parameters, analysis joins responses to parameters in one step, not rebuilding them"
context = """The manifest is the single place parameters live keyed by vignette_id. Analysis joins the response log to the manifest on that key — 'escalation vs attribution confidence' becomes a one-line join. Without it, you would be reverse-engineering parameters from IDs or prompts."""
