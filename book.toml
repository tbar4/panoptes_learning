[book]
title = "Building Panoptes: A Rust Harness, Test by Test"
authors = ["Trevor"]
description = "A phased, test-driven course for building the Panoptes evaluation harness in Rust — concept first, then pair-programmed implementation, with interactive concept-checks (multiple-choice, short-answer, and compiler-checked tracing) each phase."
language = "en"
src = "src"

# Playground "Run" ships snippets to play.rust-lang.org, which defaults to
# edition 2015 (no async/await). The async arc needs 2018+, so pin the
# playground/rustdoc edition here for every runnable ```rust block.
[rust]
edition = "2021"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
additional-css = ["theme/quiz-extra.css"]
additional-js = ["mermaid.min.js", "mermaid-init.js"]

[output.html.fold]
enable = true
level = 1

[output.html.playground]
editable = false
copyable = true

[preprocessor.quiz]
# mdbook-quiz: interactive quizzes (MultipleChoice, ShortAnswer, Tracing).
# Install with: cargo install mdbook-quiz --locked
# cache-answers persists the reader's answers in localStorage across reloads.
cache-answers = true

[preprocessor.mermaid]
command = "mdbook-mermaid"
